<div class="grid justify-content-center">
  <div class="col-12 md:col-8 lg:col-6">
    <p-card header="User Profile">
      <div class="flex flex-column gap-4">
        <div class="flex flex-column gap-2">
          <label for="fullName">Full Name</label>
          <input pInputText id="fullName" type="text" [disabled]="true" value="Alberto Admin" />
        </div>
        <div class="flex flex-column gap-2">
          <label for="username">Username</label>
          <input pInputText id="username" type="text" [disabled]="true" value="alberto_admin" />
        </div>
        <div class="flex flex-column gap-2">
          <label for="email">Email</label>
          <input pInputText id="email" type="email" [disabled]="true" value="admin@example.com" />
        </div>
        <div class="flex flex-column gap-2">
          <label for="phone">Phone Number</label>
          <input pInputText id="phone" type="text" [disabled]="true" value="1234567890" />
        </div>
        <div class="flex flex-column gap-2">
          <label for="address">Address</label>
          <input pInputText id="address" type="text" [disabled]="true" value="123 Admin St." />
        </div>
        <div class="flex flex-column gap-2">
          <label for="dob">Date of Birth</label>
          <input pInputText id="dob" type="text" [disabled]="true" value="01/01/1990" />
        </div>
        <div class="flex flex-column gap-2">
          <label for="role">Role</label>
          <input pInputText id="role" type="text" [disabled]="true" value="Administrator" />
        </div>
      </div>
    </p-card>
  </div>
</div>
